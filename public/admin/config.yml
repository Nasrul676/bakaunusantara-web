backend:
  name: git-gateway
  branch: main 

media_folder: "public/images/uploads" 
public_folder: "/images/uploads"      

publish_mode: editorial_workflow 

editor:
  preview: false 

collections:
  - name: "pages"
    label: "Halaman Website"
    description: "Atur konten untuk halaman-halaman utama website"
    files:
      - file: "public/content/home.json"
        label: "Beranda"
        name: "home"
        fields:
          - {label: "Judul Hero", name: "hero_title", widget: "string"}
          - {label: "Deskripsi Hero", name: "hero_description", widget: "text"}
          - {label: "Gambar Latar Belakang Hero", name: "hero_bg", widget: "image", required: false}
          - {label: "Jumlah Pohon Ditanam", name: "stat_trees", widget: "string"}
          - {label: "Jumlah Relawan", name: "stat_volunteers", widget: "string"}
          
      - file: "public/content/about.json"
        label: "Tentang Kami"
        name: "about"
        fields:
          - {label: "Judul Bagian", name: "title", widget: "string"}
          - {label: "Gambar Ilustrasi", name: "image", widget: "image", required: false}
          - {label: "Paragraf Utama", name: "main_content", widget: "text"}

  - name: "programs_collection"
    label: "Program Kerja"
    files:
      - file: "public/content/programs.json"
        label: "Daftar Program"
        name: "programs"
        fields:
          - name: "items"
            label: "Daftar Program Kerja"
            widget: "list"
            fields:
              - {label: "Nama Program", name: "title", widget: "string"}
              - {label: "Gambar Thumbnail", name: "thumbnail", widget: "image", required: false}
              - {label: "Ringkasan Singkat", name: "summary", widget: "text", hint: "Tampil di halaman beranda"}
              - {label: "Lokasi Target", name: "location", widget: "string"}
              - {label: "Status Program", name: "status", widget: "select", options: ["Berjalan", "Selesai", "Perencanaan"]}